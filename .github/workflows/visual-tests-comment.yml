name: Visual Regression Comment

on:
  workflow_run:
    workflows: ["Visual Regression Tests"]
    types:
      - requested
      - completed

permissions:
  pull-requests: write
  actions: read

jobs:
  mark-rechecking:
    runs-on: ubuntu-latest
    if: >
      github.event.action == 'requested' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (prs && prs.length > 0) {
              return core.setOutput('number', prs[0].number);
            }
            // pull_requests[] is empty for fork PRs — look up by head SHA
            const headSha = context.payload.workflow_run.head_sha;
            const { data } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'updated',
              direction: 'desc',
              per_page: 10,
            });
            const pr = data.find(p => p.head.sha === headSha);
            if (pr) {
              core.setOutput('number', pr.number);
            }

      - name: Find existing comment
        if: steps.pr.outputs.number
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-author: github-actions[bot]
          body-includes: Visual Regression Check

      - name: Mark comment as re-checking
        if: steps.find-comment.outputs.comment-id
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## Visual Regression Check
            :hourglass_flowing_sand: Re-checking…

  comment:
    runs-on: ubuntu-latest
    if: >
      github.event.action == 'completed' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download metadata
        uses: actions/download-artifact@v8
        id: download
        continue-on-error: true
        with:
          name: visual-test-meta
          path: visual-test-meta
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read results
        if: steps.download.outcome == 'success'
        id: meta
        run: |
          echo "pr_number=$(cat visual-test-meta/pr_number)" >> $GITHUB_OUTPUT
          echo "outcome=$(cat visual-test-meta/outcome)" >> $GITHUB_OUTPUT

      - name: Read comment body
        if: steps.download.outcome == 'success' && steps.meta.outputs.outcome == 'failure'
        id: body
        run: |
          delimiter="EOF_$(date +%s)"
          {
            echo "comment_body<<$delimiter"
            cat visual-test-meta/comment_body
            echo "$delimiter"
          } >> $GITHUB_OUTPUT

      - name: Find existing comment
        if: steps.download.outcome == 'success'
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ steps.meta.outputs.pr_number }}
          comment-author: github-actions[bot]
          body-includes: Visual Regression Check

      - name: Update PR comment — failure
        if: steps.download.outcome == 'success' && steps.meta.outputs.outcome == 'failure'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ steps.meta.outputs.pr_number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: ${{ steps.body.outputs.comment_body }}

      - name: Update PR comment — no changes
        if: steps.download.outcome == 'success' && steps.meta.outputs.outcome == 'success' && steps.find-comment.outputs.comment-id
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## Visual Regression Check
            :white_check_mark: No visual changes detected.

      - name: Update PR comment — workflow failed
        if: steps.download.outcome == 'failure' && github.event.workflow_run.conclusion == 'failure'
        run: echo "Visual test workflow failed before producing results — no comment to post."
