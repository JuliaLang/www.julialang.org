name: Visual Regression Tests
on:
  pull_request:
    branches:
      - main

concurrency:
  group: visual-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read
  pull-requests: write

jobs:
  visual-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Visual Regression Tests

      - name: Mark comment as re-checking
        if: steps.find-comment.outputs.comment-id
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## Visual Regression Tests
            :hourglass_flowing_sand: Re-checking…

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'

      - name: Install Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install visual-tests dependencies
        working-directory: visual-tests
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Precompile Julia packages
        run: |
          julia --color=yes --project -e '
              using Pkg; Pkg.instantiate();
              using NodeJS; run(`$(npm_cmd()) install highlight.js`);
              using Franklin'

      # --- 1. Build baseline from main and capture screenshots ---

      - name: Save PR visual-tests
        run: cp -r visual-tests /tmp/visual-tests

      - name: Checkout main branch for baseline
        run: git checkout ${{ github.event.pull_request.base.sha }}

      - name: Restore PR visual-tests
        run: |
          rm -rf visual-tests
          cp -r /tmp/visual-tests visual-tests

      - name: Build baseline site (main)
        run: |
          julia --color=yes --project -e '
              using NodeJS; run(`$(npm_cmd()) install highlight.js`);
              using Franklin;
              Franklin.HIGHLIGHTJS[] = abspath(joinpath("_libs", "highlight", "highlight.min.js"));
              Franklin.optimize(prerender=true, minify=false, suppress_errors=false);
              cp(joinpath("__site", "feed.xml"), joinpath("__site", "index.xml"))'

      - name: Capture baseline screenshots
        working-directory: visual-tests
        run: ./node_modules/.bin/playwright test --update-snapshots

      # --- 2. Build PR branch and compare against baseline ---

      - name: Checkout PR branch
        run: git checkout ${{ github.event.pull_request.head.sha }}

      - name: Clean previous build
        run: rm -rf __site

      - name: Build PR site
        run: |
          julia --color=yes --project -e '
              using NodeJS; run(`$(npm_cmd()) install highlight.js`);
              using Franklin;
              Franklin.HIGHLIGHTJS[] = abspath(joinpath("_libs", "highlight", "highlight.min.js"));
              Franklin.optimize(prerender=true, minify=false, suppress_errors=false);
              cp(joinpath("__site", "feed.xml"), joinpath("__site", "index.xml"))'

      - name: Compare against baseline
        id: playwright
        working-directory: visual-tests
        run: |
          set +e
          ./node_modules/.bin/playwright test
          code=$?
          if [ $code -eq 0 ]; then
            echo "outcome=success" >> $GITHUB_OUTPUT
          elif [ $code -eq 1 ]; then
            echo "outcome=failure" >> $GITHUB_OUTPUT
          else
            echo "Playwright exited with unexpected code $code"
            exit $code
          fi

      # --- 3. Report results ---

      - name: Upload test results
        if: steps.playwright.outputs.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: visual-tests/test-results/
          retention-days: 14

      - name: Generate diff report
        id: report
        if: "!cancelled()"
        working-directory: visual-tests
        run: node report-diffs.js

      - name: Update PR comment with results
        if: steps.playwright.outputs.outcome == 'failure'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: ${{ steps.report.outputs.comment_body }}

      - name: Update PR comment — no changes
        if: steps.playwright.outputs.outcome == 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## Visual Regression Tests
            :white_check_mark: No visual changes detected.
