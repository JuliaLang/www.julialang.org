<!-- Copy-to-clipboard for code blocks -->

<script>
(function(){

	const pre = document.getElementsByTagName('pre');

	for (let i = 0; i < pre.length; i++) {
		const tag_name = pre[i].children[0].className;
		const isLanguage = tag_name.startsWith('language-') || tag_name.endsWith(' hljs');
		if ( isLanguage ) {
			const button = document.createElement('button');
			button.className = 'copy-button';
			button.textContent = 'Copy';
			pre[i].appendChild(button);
		}
	}

	// Use modern clipboard API
	document.addEventListener('click', function(e) {
		if (!e.target.classList.contains('copy-button')) return;
		const code = e.target.previousElementSibling;
		if (!code) return;

		const text = code.textContent;
		if (navigator.clipboard) {
			navigator.clipboard.writeText(text).then(function() {
				e.target.textContent = 'Copied';
				setTimeout(function() { e.target.textContent = 'Copy'; }, 2000);
			}, function() {
				e.target.textContent = 'Press "Ctrl + C" to copy';
				setTimeout(function() { e.target.textContent = 'Copy'; }, 5000);
			});
		} else {
			e.target.textContent = 'Press "Ctrl + C" to copy';
			setTimeout(function() { e.target.textContent = 'Copy'; }, 5000);
		}
	});

})();
</script>
