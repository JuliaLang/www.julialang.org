<!-- Copy-to-clipboard for code blocks -->

<script>
(function(){

	var pre = document.getElementsByTagName('pre');

	for (var i = 0; i < pre.length; i++) {
		var tag_name = pre[i].children[0].className;
		var isLanguage = tag_name.startsWith('language-') || tag_name.endsWith(' hljs');
		if ( isLanguage ) {
			var button = document.createElement('button');
			button.className = 'copy-button';
			button.textContent = 'Copy';
			pre[i].appendChild(button);
		}
	}

	// Use modern clipboard API with ClipboardJS fallback
	document.addEventListener('click', function(e) {
		if (!e.target.classList.contains('copy-button')) return;
		var code = e.target.previousElementSibling;
		if (!code) return;

		var text = code.textContent;
		if (navigator.clipboard) {
			navigator.clipboard.writeText(text).then(function() {
				e.target.textContent = 'Copied';
				setTimeout(function() { e.target.textContent = 'Copy'; }, 2000);
			}, function() {
				e.target.textContent = 'Press "Ctrl + C" to copy';
				setTimeout(function() { e.target.textContent = 'Copy'; }, 5000);
			});
		} else {
			e.target.textContent = 'Press "Ctrl + C" to copy';
			setTimeout(function() { e.target.textContent = 'Copy'; }, 5000);
		}
	});

})();
</script>
